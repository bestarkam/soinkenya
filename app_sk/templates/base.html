<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Soins Kenya{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
 
  <style>
    body, html {
            height: 100%;
            display: flex;
            flex-direction: column;
            /* margin: 0 !important;
            padding: 0 !important; */
        }
    .container, .container-fluid {
            flex: 1;
            /* margin-top: 0 !important;
            padding-top: 0 !important; */
            /* padding-top: 70px;  */
        }
            /* Force le conteneur de CKEditor à respecter la largeur */
    .django-ckeditor-widget, .cke_inner {
        width: 100% !important;
    }
        /* Si besoin, limite la largeur max */
    .cke_contents {
        max-width: 800px; /* Ajuste la valeur si nécessaire */
    }
  </style>
</head>
<body>
  {% block content %}
  {% endblock %}
    
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
  
  
</body>
</html>
